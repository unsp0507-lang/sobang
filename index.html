window.addEventListener('load',function(){
  var img=document.getElementById('img');
  var cv=document.getElementById('cv');
  function resize(){
    sc=img.offsetWidth/IW;
    cv.width=img.offsetWidth; cv.height=img.offsetHeight;

function buildFields(){
  var fw=document.getElementById('fw');
  fw.innerHTML='';
  fields.forEach(function(f){
    var el=document.createElement('input');
    el.type=f.type; el.id=f.id; el.className='fi';
    el.style.left=(f.x*sc)+'px';
    el.style.top=(f.y*sc)+'px';
    el.style.width=(f.w*sc)+'px';
    el.style.height=(f.h*sc)+'px';
    el.style.fontSize=Math.max(9,Math.round(13*sc))+'px';
    el.style.pointerEvents='auto';
    if(f.id==='f-date') el.value=new Date().toISOString().slice(0,10);
    fw.appendChild(el);
  });
}

function onTap(e){
  var r=document.getElementById('cv').getBoundingClientRect();
  var ex=e.clientX-r.left, ey=e.clientY-r.top;
  var hr=18*sc;

  // 점검자 □
  var hit=false;
  checkers.forEach(function(c,i){
    if(Math.hypot(ex-c.cx*sc,ey-c.cy*sc)<hr){
      cstate[i]=!cstate[i]; hit=true; draw();
    }
  });
  if(hit) return;

  // 점검결과 □
  var best=null, bd=9999;
  checks.forEach(function(c){
    var d=Math.hypot(ex-c.cx*sc,ey-c.cy*sc);
    if(d<hr&&d<bd){bd=d;best=c;}
  });
  if(!best) return;
  var key=best.row+'_'+best.col;
  if(state[key]!==undefined){ delete state[key]; }
  else{
    [0,1,2].forEach(function(col){delete state[best.row+'_'+col];});
    state[key]=best.col;
  }
  draw();
}

function draw(){
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  var fs=Math.max(10,Math.round(16*sc));
  
  // 점검자
  checkers.forEach(function(c,i){
    if(cstate[i]){
      ctx.font='bold '+fs+'px sans-serif';
      ctx.fillStyle='#1a3a6e';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('✓',c.cx*sc,c.cy*sc);
    }
  });

  // 점검결과
  checks.forEach(function(c){
    var key=c.row+'_'+c.col;
    if(state[key]!==undefined){
      ctx.font='bold '+fs+'px sans-serif';
      ctx.fillStyle=c.col===0?'#1a7a4a':c.col===1?'#cc2222':'#666';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('✓',c.cx*sc,c.cy*sc);
    }
  });
}

function bulk(col){
  state={};
  if(col>=0){
    var rows=[...new Set(checks.map(function(c){return c.row;}))]
    rows.forEach(function(r){state[r+'_'+col]=col;});
  }
  draw();
}

  var tc=tmp.getContext('2d');
  tc.drawImage(img,0,0,IW,IH);

  // 입력값
  fields.forEach(function(f){
    var el=document.getElementById(f.id); if(!el||!el.value) return;
    var v=f.id==='f-date'?el.value.replace(/-/g,'.'):el.value;
    tc.font='bold 19px "Nanum Gothic",sans-serif';
    tc.fillStyle='#111'; tc.textAlign='left'; tc.textBaseline='middle';
    tc.fillText(v, f.x+4, f.y+f.h/2);
  });

  // 점검자
  checkers.forEach(function(c,i){
    if(cstate[i]){
      tc.font='bold 22px sans-serif'; tc.fillStyle='#1a3a6e';
      tc.textAlign='center'; tc.textBaseline='middle';
      tc.fillText('✓',c.cx,c.cy);
    }
  });

  // 점검결과
  checks.forEach(function(c){
    var key=c.row+'_'+c.col;
    if(state[key]!==undefined){
      tc.font='bold 22px sans-serif';
      tc.fillStyle=c.col===0?'#1a7a4a':c.col===1?'#cc2222':'#666';
      tc.textAlign='center'; tc.textBaseline='middle';
      tc.fillText('✓',c.cx,c.cy);
    }
  });

  var url=tmp.toDataURL('image/jpeg',0.95);
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>@page{size:A4 portrait;margin:0}body{margin:0}img{width:210mm;height:297mm;display:block}</style></head><body><img src="'+url+'"></body></html>';
  var w=window.open('','_blank');
  w.document.write(html); w.document.close(); w.focus();
  setTimeout(function(){w.print();},500);
}
</script>
</body>
</html>
